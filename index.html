<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashe 26S4 · Weekly Navigation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0e17;
            --card: #1a1932;
            --accent1: #ff6e6c;
            --accent2: #67e8f9;
            --accent3: #fbbf24;
            --accent4: #a78bfa;
            --accent5: #34d399;
            --text: #fffffe;
            --dim: #a7a9be;
        }

        body {
            font-family: 'Fredoka', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 2rem;
            position: relative;
        }

        /* Stars background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1.5px 1.5px at 20% 80%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 40% 65%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1.5px 1.5px at 15% 45%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,0.5), transparent);
            background-size: 200px 200px, 300px 300px, 250px 250px, 180px 180px, 220px 220px, 280px 280px, 320px 320px, 190px 190px, 260px 260px, 310px 310px, 170px 170px, 240px 240px;
            animation: twinkle 4s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            animation: cardIn 0.5s ease-out;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent1), var(--accent3), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.3;
        }

        /* 嵌套列表样式 */
        ul {
            list-style-type: none;
            padding-left: 0;
        }

        .week-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .week-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .week-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent3);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .week-title::before {
            content: '📅';
        }

        .file-list {
            list-style-type: none;
            padding-left: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .file-item {
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: all 0.25s;
        }

        .file-item:hover {
            border-color: var(--accent2);
            background: rgba(103,232,249,0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(103,232,249,0.2);
        }

        .file-item a {
            color: var(--text);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            display: block;
            width: 100%;
            height: 100%;
        }

        .file-item a::before {
            content: '🚀 ';
        }

        /* Responsive */
        @media (max-width: 500px) {
            body { padding: 1rem; }
            .container { padding: 1.5rem; }
            .file-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weekly Navigation</h1>
        
        <!-- 嵌套列表：第一层为周，第二层为文件 -->
        <ul>
            <li class="week-item">
                <div class="week-title">第五周</div>
                <ul class="file-list">
                    <li class="file-item">
                        <a href="week5/History.html">History</a>
                    </li>
                    <li class="file-item">
                        <a href="week5/Language.html">Language</a>
                    </li>
                    <li class="file-item">
                        <a href="week5/Economic.html">Economic</a>
                    </li>
                    <li class="file-item">
                        <a href="week5/Education.html">Education</a>
                    </li>
                </ul>
            </li>
            <!-- 后续新增周数可复制上面的 week-item 模块 -->
        </ul>
    </div>
</body>
</html>
